name: CI - Build and Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  packages-integrity:
    name: Packages Integrity Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg-dev

      - name: Build Debian packages
        shell: bash
        run: |
          set -euo pipefail
          make build

      - name: Run packages integrity test
        shell: bash
        run: |
          set -euo pipefail
          bash tests/test-packages-integrity.sh

  apt-repository:
    name: APT Repository Test
    runs-on: ubuntu-latest
    needs: packages-integrity
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run APT repository test in Docker
        shell: bash
        run: |
          set -euo pipefail
          bash tests/test-apt-repository.sh
