name: Release Debian Packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          VERSION="${TAG_NAME#v}"

          if [[ -z "${VERSION}" || "${VERSION}" == "${TAG_NAME}" ]]; then
            echo "Tag inválida: ${TAG_NAME}. Use o formato vX.Y.Z"
            exit 1
          fi

          echo "tag=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Sync Debian control versions
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"

          sed -i "s/^Version: .*/Version: ${VERSION}/" packages/emacs-a11y-config/DEBIAN/control
          sed -i "s/^Version: .*/Version: ${VERSION}/" packages/emacs-a11y-launchers/DEBIAN/control

          grep '^Version:' packages/emacs-a11y-config/DEBIAN/control
          grep '^Version:' packages/emacs-a11y-launchers/DEBIAN/control

      - name: Build packages
        shell: bash
        run: |
          set -euo pipefail
          make build VERSION="${{ steps.version.outputs.version }}"

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.deb > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Emacs A11y ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.deb
            dist/SHA256SUMS.txt