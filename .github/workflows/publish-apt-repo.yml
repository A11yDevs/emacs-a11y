name: Publish APT Repository (GitHub Pages)

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-apt-repo:
    runs-on: ubuntu-latest
    env:
      APT_GPG_PRIVATE_KEY_B64: ${{ secrets.APT_GPG_PRIVATE_KEY_B64 }}
      APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${TAG_NAME#v}"
          else
            VERSION="$(awk '/^VERSION[[:space:]]*:=[[:space:]]*/{print $3; exit}' Makefile)"
          fi

          if [[ -z "${VERSION}" ]]; then
            echo "Não foi possível resolver versão para build"
            exit 1
          fi

          echo "tag=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Sync Debian control versions
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"

          sed -i "s/^Version: .*/Version: ${VERSION}/" packages/emacs-a11y-config/DEBIAN/control
          sed -i "s/^Version: .*/Version: ${VERSION}/" packages/emacs-a11y-launchers/DEBIAN/control

      - name: Build packages
        shell: bash
        run: |
          set -euo pipefail
          make build VERSION="${{ steps.version.outputs.version }}"

      - name: Install apt tooling
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends apt-utils gnupg

      - name: Import GPG key for APT signing
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${APT_GPG_PRIVATE_KEY_B64}" ]]; then
            echo "Secret APT_GPG_PRIVATE_KEY_B64 não configurado"
            exit 1
          fi

          export GNUPGHOME="$(mktemp -d)"
          chmod 700 "${GNUPGHOME}"
          echo "GNUPGHOME=${GNUPGHOME}" >> "${GITHUB_ENV}"

          echo "${APT_GPG_PRIVATE_KEY_B64}" | base64 -d > /tmp/apt-private.key
          gpg --batch --import /tmp/apt-private.key

          KEY_FINGERPRINT="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')"

          if [[ -z "${KEY_FINGERPRINT}" ]]; then
            echo "Nenhuma chave secreta GPG foi importada"
            exit 1
          fi

          echo "APT_GPG_KEY_FINGERPRINT=${KEY_FINGERPRINT}" >> "${GITHUB_ENV}"

      - name: Build static APT repository
        shell: bash
        run: |
          set -euo pipefail

          REPO_ROOT="pages/debian"
          POOL_DIR="${REPO_ROOT}/pool/main"
          DIST_DIR="${REPO_ROOT}/dists/stable/main/binary-all"

          mkdir -p "${POOL_DIR}" "${DIST_DIR}"
          cp dist/*.deb "${POOL_DIR}/"

          # Gera paths relativos (pool/main/...) no campo Filename do Packages.
          pushd "${REPO_ROOT}" >/dev/null
          apt-ftparchive packages "pool/main" > "dists/stable/main/binary-all/Packages"
          popd >/dev/null
          gzip -9c "${DIST_DIR}/Packages" > "${DIST_DIR}/Packages.gz"

          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="A11yDevs" \
            -o APT::FTPArchive::Release::Label="emacs-a11y" \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Architectures="all" \
            -o APT::FTPArchive::Release::Components="main" \
            release "${REPO_ROOT}/dists/stable" > "${REPO_ROOT}/dists/stable/Release"

          # Normaliza segredo para evitar newline/carriage-return acidental em GitHub Secrets.
          CLEAN_PASSPHRASE="${APT_GPG_PASSPHRASE%$'\n'}"
          CLEAN_PASSPHRASE="${CLEAN_PASSPHRASE%$'\r'}"

          SIGN_BASE_ARGS=(--batch --yes --local-user "${APT_GPG_KEY_FINGERPRINT}")

          if [[ -n "${CLEAN_PASSPHRASE}" ]]; then
            SIGN_SECRET_ARGS=(--pinentry-mode loopback --passphrase-fd 0)
          else
            SIGN_SECRET_ARGS=()
          fi

          sign_file() {
            local output="$1"
            local input="$2"
            shift 2
            local mode_args=("$@")

            if [[ -n "${CLEAN_PASSPHRASE}" ]]; then
              if ! printf '%s' "${CLEAN_PASSPHRASE}" | gpg "${SIGN_BASE_ARGS[@]}" "${SIGN_SECRET_ARGS[@]}" "${mode_args[@]}" -o "${output}" "${input}"; then
                echo "Falha ao assinar com passphrase. Verifique o secret APT_GPG_PASSPHRASE."
                exit 1
              fi
            else
              if ! gpg "${SIGN_BASE_ARGS[@]}" "${mode_args[@]}" -o "${output}" "${input}"; then
                echo "Falha ao assinar com chave sem passphrase. Se sua chave tiver senha, configure APT_GPG_PASSPHRASE."
                exit 1
              fi
            fi
          }

          sign_file "${REPO_ROOT}/dists/stable/Release.gpg" "${REPO_ROOT}/dists/stable/Release" --detach-sign --armor
          sign_file "${REPO_ROOT}/dists/stable/InRelease" "${REPO_ROOT}/dists/stable/Release" --clearsign

          gpg --batch --yes --armor --export "${APT_GPG_KEY_FINGERPRINT}" > "${REPO_ROOT}/a11y-emacs-archive-keyring.asc"
          gpg --batch --yes --export "${APT_GPG_KEY_FINGERPRINT}" > "${REPO_ROOT}/a11y-emacs-archive-keyring.gpg"

          cat > "${REPO_ROOT}/index.html" <<'HTML'
          <!doctype html>
          <html lang="pt-BR">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>emacs-a11y APT Repository</title>
            </head>
            <body>
              <h1>emacs-a11y APT Repository</h1>
              <p>Use no Debian/Ubuntu:</p>
              <pre>curl -fsSL https://a11ydevs.github.io/emacs-a11y/debian/a11y-emacs-archive-keyring.gpg | sudo tee /usr/share/keyrings/emacs-a11y-archive-keyring.gpg >/dev/null
              echo "deb [signed-by=/usr/share/keyrings/emacs-a11y-archive-keyring.gpg] https://a11ydevs.github.io/emacs-a11y/debian stable main" | sudo tee /etc/apt/sources.list.d/emacs-a11y.list
              sudo apt update
              sudo apt install emacs-a11y-config emacs-a11y-launchers</pre>
            </body>
          </html>
          HTML

          touch pages/.nojekyll

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./pages
          force_orphan: true